# ================= DATASOURCE =================
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER}
quarkus.datasource.password=${DB_PASSWORD}
quarkus.datasource.jdbc.url=${DB_URL}

# Estrategia de schema: validate en producción (Flyway gestiona la BD),
# update en dev (conveniencia), drop-and-create en tests (H2 en memoria).
# Sobreescribible con env var HIBERNATE_SCHEMA_STRATEGY.
%prod.quarkus.hibernate-orm.schema-management.strategy=${HIBERNATE_SCHEMA_STRATEGY:validate}
%dev.quarkus.hibernate-orm.schema-management.strategy=${HIBERNATE_SCHEMA_STRATEGY:update}
quarkus.hibernate-orm.mapping.format.global=ignore

# ================= FLYWAY =================
# Aplica migraciones automáticamente al arrancar (solo en prod y dev con PG).
# En tests se deshabilita; H2 usa drop-and-create de Hibernate.
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration
# baseline-on-migrate: necesario cuando la DB ya existe (creada por Hibernate).
# Flyway crea el historial y marca V1 como aplicada sin reejecutar el SQL.
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.baseline-version=1
%test.quarkus.flyway.enabled=false

quarkus.http.host=0.0.0.0
quarkus.http.port=8080
# ================= HTTPS (optional) =================
# Direct keystore config (default). For TLS 1.2/1.3 and Chrome compatibility use profile "prod" (see application-prod.properties).
quarkus.http.ssl-port=${HTTPS_PORT:-8443}
quarkus.http.ssl.certificate.key-store-file=${HTTPS_KEYSTORE_FILE:}
quarkus.http.ssl.certificate.key-store-password=${HTTPS_KEYSTORE_PASSWORD:password}
quarkus.http.ssl.certificate.key-store-file-type=PKCS12
# insecure-requests: enabled=HTTP+HTTPS, redirect=HTTP->HTTPS, disabled=only HTTPS
quarkus.http.insecure-requests=${HTTPS_INSECURE_REQUESTS:enabled}

# ================= KEYCLOAK =================
# Default keycloak:8443 for Docker Compose. Override KEYCLOAK_URL for local dev (e.g. https://localhost:8443).
keycloak.url=${KEYCLOAK_URL:https://keycloak:8443}
keycloak.realm=${KEYCLOAK_REALM:livemenu}
# Timeout in seconds for HTTP calls to Keycloak (introspect, admin, etc.). Increase in prod if Keycloak is slow.
keycloak.http.timeout-seconds=${KEYCLOAK_HTTP_TIMEOUT_SEC:-15}

# ================= OIDC (RESOURCE SERVER) =================
quarkus.oidc.auth-server-url=${keycloak.url}/realms/${keycloak.realm}
quarkus.oidc.client-id=${OIDC_CLIENT_ID:livemenu-backend}
quarkus.oidc.credentials.secret=${OIDC_CLIENT_SECRET:}
quarkus.oidc.application-type=service
# Trust Keycloak HTTPS (self-signed or by IP); named TLS config for OIDC WebClient
quarkus.oidc.tls.tls-configuration-name=keycloak
quarkus.tls.keycloak.trust-all=true
# Allow connection by IP (cert has no SAN for 192.168.0.148)
quarkus.tls.keycloak.hostname-verification-algorithm=NONE

# ================= OIDC CLIENT (PASSWORD GRANT) =================
# No client created at startup: AuthResource uses AuthOidcClientProvider (lazy) so the app starts without Keycloak.
quarkus.oidc-client.client-enabled=false
# Global trust for outbound HTTPS (e.g. AuthOidcClientProvider, Keycloak admin); dev/self-signed only
quarkus.tls.trust-all=true
quarkus.tls.hostname-verification-algorithm=NONE
# ================= KEYCLOAK ADMIN =================
keycloak.admin.url=${keycloak.url}
keycloak.admin.realm=${keycloak.realm}
keycloak.admin.client-id=${KEYCLOAK_ADMIN_CLIENT_ID:backend-admin}
keycloak.admin.client-secret=${KEYCLOAK_ADMIN_CLIENT_SECRET:}
keycloak.admin.username=${KEYCLOAK_ADMIN:}
keycloak.admin.password=${KEYCLOAK_ADMIN_PASSWORD:}

# ================= GCP STORAGE (optional: leave unset to run without image upload) =================
gcp.storage.bucket.name=${GCP_STORAGE_BUCKET_NAME:}
gcp.storage.credentials.path=${GCP_STORAGE_CREDENTIALS_PATH:}

# ================= APP =================
app.public.base.url=${PUBLIC_BASE_URL:http://0.0.0.0:8080}

quarkus.cache.enabled=true
quarkus.console.enabled=false

# ================= OPENAPI / SWAGGER =================
quarkus.smallrye-openapi.path=/q/openapi
quarkus.swagger-ui.path=/q/swagger-ui
quarkus.swagger-ui.always-include=true

# ================= CORS =================
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=${CORS_ORIGINS:http://localhost:4200,http://localhost:8080,https://livemenu.naing.co:4443,https://livemenu.naing.co,https://www.livemenu.naing.co,http://livemenu.naing.co,http://www.livemenu.naing.co,https://api.livemenu.naing.co,http://api.naing.co}
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=Authorization,Content-Type,Accept,X-Requested-With
quarkus.http.cors.access-control-max-age=24H
quarkus.http.cors.access-control-allow-credentials=true
