# Datasource: JDBC URL, username and password (env: DB_URL, DB_USER, DB_PASSWORD)
quarkus.datasource.db-kind = postgresql
quarkus.datasource.username = ${DB_USER}
quarkus.datasource.password = ${DB_PASSWORD}
quarkus.datasource.jdbc.url = ${DB_URL}
# Schema management: use 'drop-and-create' for dev, 'validate' or 'update' for production
# In production, set HIBERNATE_SCHEMA_STRATEGY=validate or HIBERNATE_SCHEMA_STRATEGY=update
quarkus.hibernate-orm.schema-management.strategy = ${HIBERNATE_SCHEMA_STRATEGY:drop-and-create}
# Hibernate ORM JSON mapping: ignore Jackson formatting to avoid conflicts with REST serialization
quarkus.hibernate-orm.mapping.format.global = ignore
quarkus.http.host=0.0.0.0
quarkus.http.port=8080
# Keycloak base URL and realm (env: KEYCLOAK_URL, KEYCLOAK_REALM; defaults for local)
keycloak.url = ${KEYCLOAK_URL:http://localhost:8180}
keycloak.realm = ${KEYCLOAK_REALM:livemenu}

# OIDC: auth server URL is keycloak.url/realms/keycloak.realm; client id/secret for token validation
quarkus.oidc.auth-server-url = ${keycloak.url}/realms/${keycloak.realm}
quarkus.oidc.client-id = ${OIDC_CLIENT_ID:livemenu-backend}
quarkus.oidc.credentials.secret = ${OIDC_CLIENT_SECRET}
quarkus.oidc.application-type = service

# OIDC Client: used by /login to request tokens (password grant). Same realm and client as above.
quarkus.oidc-client.auth-server-url = ${keycloak.url}/realms/${keycloak.realm}
quarkus.oidc-client.client-id = ${OIDC_CLIENT_ID:livemenu-backend}
quarkus.oidc-client.credentials.secret = ${OIDC_CLIENT_SECRET}
quarkus.oidc-client.grant.type = password

# Keycloak Admin REST API: same base URL; user creation via admin user (master) or client credentials
keycloak.admin.url = ${keycloak.url}
keycloak.admin.realm = ${keycloak.realm}
keycloak.admin.client-id = ${KEYCLOAK_ADMIN_CLIENT_ID:backend-admin}
keycloak.admin.client-secret = ${KEYCLOAK_ADMIN_CLIENT_SECRET}
keycloak.admin.username = ${KEYCLOAK_ADMIN:}
keycloak.admin.password = ${KEYCLOAK_ADMIN_PASSWORD:}

# Image upload and processing configuration
app.images.max.size.mb = ${IMAGES_MAX_SIZE_MB:5}
# Optional: Custom base URL for images (CDN or custom domain). Leave empty to use GCS public URLs.
# Note: This property is optional. If not set, GCS public URLs will be used.

# Google Cloud Storage configuration (Service Account JSON key file)
gcp.storage.bucket.name = ${GCP_STORAGE_BUCKET_NAME}
gcp.storage.credentials.path = ${GOOGLE_APPLICATION_CREDENTIALS}

# Public menu and QR code configuration
app.public.base.url = ${PUBLIC_BASE_URL:http://0.0.0.0:8080

# Cache configuration for public menu
quarkus.cache.enabled = true

# Rate limiting (RNF04): 100 requests per minute per client IP
app.rate-limit.enabled = ${RATE_LIMIT_ENABLED:true}
app.rate-limit.requests-per-minute = ${RATE_LIMIT_REQUESTS_PER_MINUTE:100}

# Analytics: salt for IP hashing (anonimización). Must be set in production.
app.analytics.ip-hash.salt = ${ANALYTICS_IP_HASH_SALT:livemenu-default-salt-change-in-production}

# Disable dev console to avoid console initialization issues (common in Git Bash on Windows)
quarkus.dev-ui.enabled = false
quarkus.console.enabled = false

# CORS configuration for Angular frontend
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=http://localhost:4200,http://api.naing.co
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=Authorization,Content-Type,Accept,X-Requested-With
quarkus.http.cors.access-control-max-age=24H
quarkus.http.cors.access-control-allow-credentials=true