# Test configuration
quarkus.datasource.db-kind = h2
quarkus.datasource.username = sa
quarkus.datasource.password = 
quarkus.datasource.jdbc.url = jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
quarkus.hibernate-orm.schema-management.strategy = drop-and-create
quarkus.hibernate-orm.mapping.format.global = ignore

# Disable Keycloak for tests (we'll mock it)
quarkus.oidc.enabled = false
quarkus.oidc-client.enabled = false

# Disable GCP Storage for tests (we'll mock it)
gcp.storage.bucket.name = test-bucket
gcp.storage.credentials.path = 

# Test image configuration
app.images.max.size.mb = 5
app.public.base.url = http://localhost:8080

# Disable cache for tests
quarkus.cache.enabled = false

# CORS for tests
quarkus.http.cors.enabled = true
quarkus.http.cors.origins = http://localhost:4200
quarkus.http.cors.headers = accept,authorization,content-type,x-requested-with
quarkus.http.cors.methods = GET,POST,PUT,PATCH,DELETE,OPTIONS
quarkus.http.cors.credentials = true

