# ── Test profile: overrides aplicados al correr mvnw test ──────────────────
# Estos valores reemplazan los de src/main/resources/application.properties
# durante la ejecución de tests (perfil %test de Quarkus).

# ── Base de datos: H2 en memoria (no requiere PostgreSQL externo) ────────────
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.username=sa
%test.quarkus.datasource.password=
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
%test.quarkus.hibernate-orm.schema-management.strategy=drop-and-create

# ── Flyway: deshabilitado para tests (H2 usa Hibernate drop-and-create) ─────
%test.quarkus.flyway.enabled=false

# ── Deshabilitar DevServices (no arrancar contenedores Docker en CI) ─────────
%test.quarkus.devservices.enabled=false

# ── OIDC: deshabilitar validación JWT externa (no requiere Keycloak) ─────────
# Los tests que necesitan identidad usan @TestSecurity en su lugar.
%test.quarkus.oidc.enabled=false

# ── Valores dummy para config properties sin default ────────────────────────
# Evita startup failure por variables de entorno no definidas en CI.
%test.keycloak.url=http://localhost:8180
%test.keycloak.admin.client-secret=test-secret-ci
%test.OIDC_CLIENT_SECRET=test-oidc-secret-ci
