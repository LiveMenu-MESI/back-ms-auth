services:
  postgres:
    image: postgres
    container_name: postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
      DB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql
      - ../containers/postgres/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init.sh
    ports:
      - "${DB_PORT}:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      retries: 10

  keycloak:
    build:
      context: ../containers/keycloak
    container_name: keycloak
    env_file:
      - .env
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${KC_DB_USERNAME}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HOSTNAME: ${KC_HOSTNAME}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET}
      KEYCLOAK_ADMIN_CLIENT_SECRET: ${KEYCLOAK_ADMIN_CLIENT_SECRET}
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_HTTP_ENABLED: "true"
    ports:
      - "8180:8080"
      - "8443:8443"
    depends_on:
      postgres:
        condition: service_healthy
    command: start --optimized --import-realm
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080 || exit 1"]
      interval: 1s
      timeout: 1s
      retries: 5
      start_period: 45s

  livemenu:
    build:
      context: ..
      dockerfile: src/main/docker/Dockerfile.jvm.multi
    image: livemenu-app:latest
    container_name: livemenu
    env_file:
      - .env
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/livemenu
      DB_USER: livemenu
      DB_PASSWORD: ${DB_PASSWORD}
      KEYCLOAK_URL: ${KEYCLOAK_URL:-http://keycloak:8080}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET}
      KEYCLOAK_ADMIN_CLIENT_SECRET: ${KEYCLOAK_ADMIN_CLIENT_SECRET}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      HIBERNATE_SCHEMA_STRATEGY: ${HIBERNATE_SCHEMA_STRATEGY:-update}
      # GCP Storage (optional: set GCP_CREDENTIALS_FILE and GCP_STORAGE_BUCKET_NAME to enable image upload)
      GOOGLE_APPLICATION_CREDENTIALS: /app/config/gcp-credentials.json
      GCP_STORAGE_BUCKET_NAME: ${GCP_STORAGE_BUCKET_NAME:-}
      # HTTPS: keystore mounted at /app/config/keystore.p12 (set HTTPS_ENABLED=true in .env)
      HTTPS_ENABLED: ${HTTPS_ENABLED:-false}
      HTTPS_PORT: ${HTTPS_PORT:-8443}
      HTTPS_KEYSTORE_FILE: ${HTTPS_KEYSTORE_FILE:-/app/config/keystore.p12}
      HTTPS_KEYSTORE_PASSWORD: ${HTTPS_KEYSTORE_PASSWORD:-changeit}
      HTTPS_INSECURE_REQUESTS: ${HTTPS_INSECURE_REQUESTS:-enabled}
    volumes:
      # Mount service account JSON for GCP Storage (path on host from .env, e.g. ./gcp-credentials.json)
      - ${GCP_CREDENTIALS_FILE:-./gcp-credentials.json}:/app/config/gcp-credentials.json:ro
      # HTTPS keystore (compose/config/keystore.p12 when HTTPS_ENABLED=true)
      - ./config/keystore.p12:/app/config/keystore.p12:ro
    ports:
      - "${LIVEMENU_PORT:-8081}:8080"
      # Host port 8444 to avoid conflict with Keycloak (8180/8443); container listens on 8443
      - "${LIVEMENU_HTTPS_PORT:-8444}:8443"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
