services:
  postgres:
    image: postgres
    container_name: postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
      DB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql
      - ../containers/postgres/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init.sh
    ports:
      - "${DB_PORT}:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      retries: 10

  keycloak:
    build:
      context: ../containers/keycloak
    container_name: keycloak
    env_file:
      - .env
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${KC_DB_USERNAME}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HOSTNAME: ${KC_HOSTNAME}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET}
      KEYCLOAK_ADMIN_CLIENT_SECRET: ${KEYCLOAK_ADMIN_CLIENT_SECRET}
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_HTTP_ENABLED: "true"
    ports:
      - "8180:8080"
      - "8443:8443"
    depends_on:
      postgres:
        condition: service_healthy
    command: start --optimized --import-realm
    restart: unless-stopped

  livemenu:
    build:
      context: ..
      dockerfile: src/main/docker/Dockerfile.jvm.multi
    image: livemenu-app:latest
    container_name: livemenu
    env_file:
      - .env
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/livemenu
      DB_USER: livemenu
      DB_PASSWORD: ${DB_PASSWORD}
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-livemenu}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-livemenu-backend}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET}
      KEYCLOAK_ADMIN_CLIENT_ID: ${KEYCLOAK_ADMIN_CLIENT_ID:-backend-admin}
      KEYCLOAK_ADMIN_CLIENT_SECRET: ${KEYCLOAK_ADMIN_CLIENT_SECRET}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8080}
      HIBERNATE_SCHEMA_STRATEGY: ${HIBERNATE_SCHEMA_STRATEGY:-update}
      # GCP Storage (optional: set GCP_CREDENTIALS_FILE and GCP_STORAGE_BUCKET_NAME to enable image upload)
      GOOGLE_APPLICATION_CREDENTIALS: /app/config/gcp-credentials.json
      GCP_STORAGE_BUCKET_NAME: ${GCP_STORAGE_BUCKET_NAME:-}
    volumes:
      # Mount service account JSON for GCP Storage (path on host from .env, e.g. ./gcp-credentials.json)
      - ${GCP_CREDENTIALS_FILE:-./gcp-credentials.json}:/app/config/gcp-credentials.json:ro
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data: