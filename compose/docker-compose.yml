services:
  postgres:
    image: postgres
    container_name: postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
      DB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql
      - ../containers/postgres/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init.sh
    ports:
      - "${DB_PORT}:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      retries: 10
  pgbouncer:
    image: edoburu/pgbouncer
    container_name: pgbouncer
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c", "tr -d '\\r' < /etc/pgbouncer/entrypoint.sh | /bin/sh"]
    ports:
      - "${PGBOUNCER_PORT}:6432"
    volumes:
      - ../containers/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini
      - ../containers/pgbouncer/entrypoint.sh:/etc/pgbouncer/entrypoint.sh
    environment:
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
      DB_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POOL_MODE: ${PGBOUNCER_POOL_MODE}
      MAX_CLIENT_CONN: ${PGBOUNCER_MAX_CLIENT_CONN}
      DEFAULT_POOL_SIZE: ${PGBOUNCER_DEFAULT_POOL_SIZE}
      AUTH_TYPE: md5
    restart: unless-stopped

  keycloak:
    build:
      context: ../containers/keycloak
    container_name: keycloak
    env_file:
      - .env
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${KC_DB_USERNAME}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HOSTNAME: ${KC_HOSTNAME}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET}
      KEYCLOAK_ADMIN_CLIENT_SECRET: ${KEYCLOAK_ADMIN_CLIENT_SECRET}
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_HTTP_ENABLED: "true"
    ports:
      - "8180:8080"
      - "8443:8443"
    depends_on:
      postgres:
        condition: service_healthy
    command: start --optimized --import-realm
    restart: unless-stopped

volumes:
  postgres_data: