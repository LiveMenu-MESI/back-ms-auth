# Workflow superseded by ci-cd.yml (includes Trivy scan + deploy).
# Kept as manual trigger only to avoid duplicate runs.
name: CI (manual)

on:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"

      - name: Build and run tests
        run: ./mvnw -B verify -DskipITs=true
