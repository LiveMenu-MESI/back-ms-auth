# CI/CD del Backend — LiveMenu (Quarkus)
# 1. Build + unit tests
# 2. Trivy: escaneo de vulnerabilidades (bloquea en Critical/High)
# 3. Push a Artifact Registry (solo en main)
# 4. Deploy a Cloud Run (solo en main)
#
# Autenticación: Workload Identity Federation (sin service account keys)
# Configura en GitHub Secrets:
#   GCP_PROJECT_ID           — ID del proyecto GCP
#   GCP_REGION               — Región (ej. us-central1)
#   WIF_PROVIDER             — output de Terraform: workload_identity_provider
#   WIF_SERVICE_ACCOUNT      — output de Terraform: cicd_service_account

name: CI/CD Backend

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  GCP_REGION:     ${{ secrets.GCP_REGION }}
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  IMAGE_NAME:     ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/livemenu/backend

jobs:
  # -----------------------------------------------------------------------
  # 1. Build y tests unitarios
  # -----------------------------------------------------------------------
  build-and-test:
    name: Build & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Hacer mvnw ejecutable
        run: chmod +x mvnw

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"

      - name: Build y tests unitarios
        run: ./mvnw -B verify -DskipITs=true

  # -----------------------------------------------------------------------
  # 2. Build Docker + Trivy + (push + deploy en main)
  # -----------------------------------------------------------------------
  docker:
    name: Docker Build + Trivy Scan
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: read
      id-token: write  # Requerido para Workload Identity Federation
      security-events: write  # Para subir resultados SARIF a GitHub Security

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Autenticación con GCP (solo en main; en PRs no se necesita push)
      - name: Autenticación en GCP (Workload Identity Federation)
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Configurar gcloud CLI
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: google-github-actions/setup-gcloud@v2

      - name: Login a Artifact Registry
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      # Build la imagen (siempre, para detectar errores antes del merge)
      - name: Build imagen Docker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/main/docker/Dockerfile.jvm.multi
          push: false
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
          load: true  # Cargar en Docker local para el escaneo
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ----------------------------------------------------------------
      # TRIVY — Escaneo de vulnerabilidades
      # El pipeline FALLA si se detectan vulnerabilidades Critical o High
      # ----------------------------------------------------------------
      - name: Trivy — Escaneo de vulnerabilidades (tabla)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          exit-code: "0"  # Solo para ver el reporte
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH,MEDIUM"

      - name: Trivy — Bloquear si hay Critical o High
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: sarif
          output: trivy-backend-results.sarif
          exit-code: "1"        # FALLA el pipeline ante Critical/High
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"

      - name: Subir resultados Trivy a GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-backend-results.sarif
          category: trivy-backend

      # Push solo en rama main, después de pasar el escaneo
      - name: Push imagen a Artifact Registry
        if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && success()
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/main/docker/Dockerfile.jvm.multi
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Deploy a Cloud Run
      - name: Deploy a Cloud Run
        if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && success()
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: livemenu-backend
          region: ${{ env.GCP_REGION }}
          image: ${{ env.IMAGE_NAME }}:${{ github.sha }}
